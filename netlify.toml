[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL"

# This redirects routing rule ensures that the Vite React SPA
# gracefully absorbs nested URLs directly rather than kicking 404s.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
